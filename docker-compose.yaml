# =============================================================================
# docker-compose.yaml — Pipeline ETL/ELT DataMart S.A.S.
# =============================================================================
# Basado en la guía oficial de Airflow, simplificado con LocalExecutor.
#
# SERVICIOS ELIMINADOS vs. CeleryExecutor oficial:
#   ✗ Redis          — no se necesita para colas distribuidas
#   ✗ airflow-worker — LocalExecutor corre las tareas en el mismo proceso
#   ✗ flower         — panel de monitoreo de Celery
#
# SERVICIOS ACTIVOS:
#   ✓ postgres-meta        — BD interna de metadatos de Airflow (NO es tu DW)
#   ✓ airflow-init         — inicializa BD, crea usuario, conexión y variables (corre 1 vez)
#   ✓ airflow-webserver    — UI en http://localhost:8080
#   ✓ airflow-scheduler    — orquestador con LocalExecutor
#   ✓ airflow-dag-processor — procesa y registra los DAGs (NUEVO en Airflow 3.x)
# =============================================================================

x-airflow-common:
  &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  image: custom-airflow-dbt:3.2.2
  env_file:
    - .env
  environment:
    &airflow-common-env
    # ── Executor ─────────────────────────────────────────────────────────────
    AIRFLOW__CORE__EXECUTOR: LocalExecutor

    # ── Comunicación interna worker ↔ API server (necesario en Airflow 3.x) ──
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-webserver:8080/execution/'

    # ── Clave JWT compartida para firmar/verificar tokens internos worker↔API ─
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET}

    # ── Metadatos internos de Airflow (postgres-meta, red interna Docker) ────
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-meta/airflow

    # ── Seguridad ─────────────────────────────────────────────────────────────
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}

    # ── Auth Manager (FAB → permite crear usuarios con roles en Airflow 3.x) ─
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager

    # ── Comportamiento ────────────────────────────────────────────────────────
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'

    # ── Credenciales de la BD externa (leídas por dbt/profiles.yml) ──────────
    DBT_DB_HOST:     ${DBT_DB_HOST}
    DBT_DB_PORT:     ${DBT_DB_PORT}
    DBT_DB_USER:     ${DBT_DB_USER}
    DBT_DB_PASSWORD: ${DBT_DB_PASSWORD}
    DBT_DB_NAME:     ${DBT_DB_NAME}
    DBT_DB_SCHEMA:   ${DBT_DB_SCHEMA}

  volumes:
    # Rutas RELATIVAS → portabilidad total (funciona en cualquier máquina)
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./dbt:/opt/airflow/dbt
    # Los CSV de datos de entrada
    - ./data:/opt/airflow/data

  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    postgres-meta:
      condition: service_healthy


services:

  # ---------------------------------------------------------------------------
  # 1. PostgreSQL interno — SOLO para metadatos de Airflow
  # ---------------------------------------------------------------------------
  # ⚠️  NO es tu base de datos de proyecto.
  # Tu DW está en el servidor externo configurado en .env (DBT_DB_*).
  # ---------------------------------------------------------------------------
  postgres-meta:
    image: postgres:15-alpine
    container_name: airflow_postgres_meta
    environment:
      POSTGRES_USER:     airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB:       airflow
    volumes:
      - postgres_meta_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # 2. Inicialización — Corre UNA VEZ y termina con código 0
  # ---------------------------------------------------------------------------
  # Este servicio:
  #   a) Prepara carpetas y permisos (corre como root)
  #   b) Migra la BD de metadatos de Airflow
  #   c) Migra las tablas de FAB y crea el usuario administrador en la UI
  #   d) Registra la Connection 'postgres_datamart' (BD externa del proyecto)
  #   e) Inicializa las Variables que usa el DAG
  # Los servicios webserver y scheduler esperan a que este termine con éxito.
  # ---------------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: airflow_init
    user: "0:0"          # corre como root SOLO para arreglar permisos
    entrypoint: /bin/bash
    command:
      - -c
      - |
        echo "=== [0/4] Preparando carpetas y permisos... ==="
        mkdir -p /opt/airflow/logs /opt/airflow/dags /opt/airflow/plugins /opt/airflow/dbt /opt/airflow/data
        chown -R "50000:0" /opt/airflow/logs /opt/airflow/plugins /opt/airflow/dbt
        chmod -R 775 /opt/airflow/logs /opt/airflow/plugins /opt/airflow/dbt

        echo "=== [1/4] Migrando base de datos de metadatos... ==="
        airflow db migrate

        echo "=== [2/4] Migrando tablas FAB y creando usuario administrador... ==="
        airflow fab-db migrate
        airflow users create \
          --username "${_AIRFLOW_WWW_USER_USERNAME:-admin}" \
          --firstname "Admin" \
          --lastname  "User" \
          --role      "Admin" \
          --email     "admin@datamart.local" \
          --password  "${_AIRFLOW_WWW_USER_PASSWORD:-admin}" || true

        echo "=== [3/4] Registrando Connection: postgres_datamart... ==="
        airflow connections delete 'postgres_datamart' 2>/dev/null || true
        airflow connections add 'postgres_datamart' \
          --conn-type   'postgres' \
          --conn-host   "${DBT_DB_HOST}" \
          --conn-port   "${DBT_DB_PORT}" \
          --conn-login  "${DBT_DB_USER}" \
          --conn-password "${DBT_DB_PASSWORD}" \
          --conn-schema "${DBT_DB_NAME}"

        echo "=== [4/4] Inicializando Variables del pipeline... ==="
        airflow variables set data_path  "/opt/airflow/data"
        airflow variables set batch_size "10000"
        airflow variables set pipeline_env "production"

        echo "=== Inicialización completada exitosamente. ==="
    restart: on-failure
    depends_on:
      postgres-meta:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # 3. Webserver — Interfaz gráfica + API server de Airflow
  # ---------------------------------------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    command: api-server
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------------
  # 4. Scheduler — Motor de orquestación con LocalExecutor
  # ---------------------------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------------
  # 5. DAG Processor — Procesa y registra los DAGs (NUEVO en Airflow 3.x)
  # ---------------------------------------------------------------------------
  airflow-dag-processor:
    <<: *airflow-common
    container_name: airflow_dag_processor
    command: dag-processor
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully


volumes:
  postgres_meta_data:
    driver: local