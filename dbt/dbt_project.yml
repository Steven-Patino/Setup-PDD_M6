# =============================================================================
# dbt_project.yml — Proyecto DataMart S.A.S.
# =============================================================================

name: 'datamart_pipeline'
version: '1.0.0'
config-version: 2

profile: 'default'

model-paths:    ["models"]
macro-paths:    ["macros"]
test-paths:     ["tests"]
seed-paths:     ["seeds"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# =============================================================================
# Configuración de materialización y schemas
# =============================================================================
# La macro generate_schema_name.sql garantiza que los schemas se creen
# exactamente con los nombres definidos aquí (sin prefijos).
#
# staging → VIEWS  en schema 'staging': no consumen almacenamiento, siempre frescos
# marts   → TABLES en schema 'marts':   materializados para consultas analíticas rápidas
models:
  datamart_pipeline:
    staging:
      +materialized: view
      +schema: staging
    marts:
      +materialized: table
      +schema: marts
