# =============================================================================
# dbt_project.yml — Configuración principal del proyecto dbt
# =============================================================================

name: 'pipeline_etl'
version: '1.0.0'
config-version: 2

# Debe coincidir con el nombre del perfil en profiles.yml
profile: 'default'

# Rutas relativas a la raíz del proyecto dbt
model-paths:    ["models"]
test-paths:     ["tests"]
seed-paths:     ["seeds"]
macro-paths:    ["macros"]
snapshot-paths: ["snapshots"]

# Carpetas generadas automáticamente (excluidas de Git en .gitignore)
clean-targets:
  - "target"
  - "dbt_packages"

# =============================================================================
# Configuración de materialización por capa
# =============================================================================
# staging → VIEWS: no consumen espacio de almacenamiento, siempre actualizadas.
# marts   → TABLES: materializadas para consultas rápidas y analítica.
models:
  pipeline_etl:
    staging:
      +materialized: view
      +schema: staging           # Se creará en el schema: <DBT_DB_SCHEMA>_staging
    marts:
      +materialized: table
      +schema: marts             # Se creará en el schema: <DBT_DB_SCHEMA>_marts
