version: 2

models:
  - name: dim_producto
    description: "Dimensión de productos con código, nombre canónico y categoría"
    columns:
      - name: producto_key
        tests: [not_null, unique]
      - name: codigo_producto
        tests: [not_null, unique]

  - name: dim_cliente
    description: "Dimensión de clientes. Incluye 'GUEST' para transacciones sin ID"
    columns:
      - name: cliente_key
        tests: [not_null, unique]
      - name: customer_id
        tests: [not_null]

  - name: dim_tiempo
    description: "Dimensión de tiempo: una fila por cada fecha presente en transacciones"
    columns:
      - name: tiempo_key
        tests: [not_null, unique]
      - name: fecha
        tests: [not_null]

  - name: dim_pais
    description: "Dimensión de países"
    columns:
      - name: pais_key
        tests: [not_null, unique]

  - name: fact_ventas
    description: "Tabla de hechos: solo VENTAS válidas (quantity>0, price>0)"
    columns:
      - name: transaction_key
        tests: [not_null, unique]
      - name: revenue_bruto
        description: "quantity × unit_price"
        tests: [not_null]

  - name: fact_devoluciones
    description: "Tabla de hechos: solo DEVOLUCIONES (quantity<=0)"
    columns:
      - name: transaction_key
        tests: [not_null, unique]
      - name: revenue_devolucion
        description: "Valor positivo de la devolución para facilitar cálculo de revenue_neto"

  - name: mart_revenue_producto
    description: "Mart analítico pre-agregado: revenue neto por producto, fecha y país"
    columns:
      - name: revenue_neto
        description: "revenue_ventas - revenue_devoluciones"
        tests: [not_null]
