version: 2

# =============================================================================
# Definición de FUENTES — tablas crudas cargadas por el DAG de Airflow
# =============================================================================
sources:
  - name: raw
    description: "Schema raw: tablas cargadas directamente desde los CSV de Kaggle"
    schema: raw
    tables:
      - name: ecommerce_data
        description: "Datos crudos de data.csv (fuente 1: ecommerce 2010-2011)"
      - name: online_retail_ii
        description: "Datos crudos de online_retail_II.csv (fuente 2: historial 2009-2011)"

# =============================================================================
# Definición de MODELOS de staging
# =============================================================================
models:
  - name: stg_ecommerce
    description: "Staging de data.csv: limpieza, tipos, clasificación venta/devolución"
    columns:
      - name: invoice_no
        tests: [not_null]
      - name: stock_code
        tests: [not_null]
      - name: transaction_type
        tests:
          - accepted_values:
              values: ['VENTA', 'DEVOLUCION']

  - name: stg_online_retail
    description: "Staging de online_retail_II.csv: misma limpieza, columnas normalizadas"
    columns:
      - name: invoice_no
        tests: [not_null]
      - name: stock_code
        tests: [not_null]

  - name: stg_transactions_unified
    description: "Unión deduplicada de ambas fuentes. Clave compuesta: invoice_no + stock_code + fecha"
    columns:
      - name: transaction_key
        description: "Clave única MD5(invoice_no + stock_code + invoice_date_utc)"
        tests: [not_null, unique]
