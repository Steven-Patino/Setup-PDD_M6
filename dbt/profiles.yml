# =============================================================================
# dbt/profiles.yml — Conexión a la base de datos PostgreSQL externa
# =============================================================================
# SEGURO para subir a Git: todos los valores sensibles vienen de variables
# de entorno inyectadas por docker-compose.yaml desde el archivo .env.
#
# Flujo: .env → docker-compose (environment:) → container → profiles.yml
# =============================================================================

default:
  target: dev
  outputs:
    dev:
      type: postgres
      host:     "{{ env_var('DBT_DB_HOST') }}"
      port:     "{{ env_var('DBT_DB_PORT', '5432') | int }}"
      user:     "{{ env_var('DBT_DB_USER') }}"
      password: "{{ env_var('DBT_DB_PASSWORD') }}"
      dbname:   "{{ env_var('DBT_DB_NAME') }}"
      # El schema 'public' es el schema por defecto de dbt.
      # Los modelos van a 'staging' y 'marts' gracias a la macro generate_schema_name.
      schema:   "{{ env_var('DBT_DB_SCHEMA', 'public') }}"
      threads: 4
      connect_timeout: 10
      sslmode: prefer
